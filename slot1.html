<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neon Slots</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="game">
        <div class="card">
            <h2 class="title"><span class="dot"></span> Neon Slots</h2>
            <div class="reels-wrap">
                <div id="reels" class="reels" aria-live="polite" aria-label="Slot reels">
                    <!-- Reels rendered by JS -->
                </div>
                <div class="hud">
                    <div class="left">
                        <div class="stat"><span class="muted">Balance:</span> <b id="balance">—</b></div>
                        <div class="select">
                            <label for="lines">Lines (1–10)</label>
                            <select id="lines">
                                <option>10</option>
                                <option>9</option>
                                <option>8</option>
                                <option>7</option>
                                <option>6</option>
                                <option>5</option>
                                <option>4</option>
                                <option>3</option>
                                <option>2</option>
                                <option>1</option>
                            </select>
                        </div>
                        <div class="select">
                            <label for="bet">Bet per line</label>
                            <select id="bet">
                                <option value="0.10">0.10</option>
                                <option value="0.20">0.20</option>
                                <option value="0.50" selected>0.50</option>
                                <option value="1">1.00</option>
                                <option value="2">2.00</option>
                                <option value="5">5.00</option>
                            </select>
                        </div>
                    </div>
                    <div class="right">
                        <button id="spin">Spin</button>
                        <button id="max">Max Bet</button>
                    </div>
                </div>
                <div id="message" class="message"></div>
            </div>
            <div class="footer">
                Tip: press <b>Space</b> to spin. Wins pay left-to-right on active lines. Minimum 3 of a kind.
            </div>
        </div>

        <div class="card sidebar">
            <div class="paytable">
                <h3>Paytable (× bet per line)</h3>
                <div class="table">
                    <div class="head">Symbol</div>
                    <div class="head">3</div>
                    <div class="head">4</div>
                    <div class="head">5</div>
                    <div>💎</div>
                    <div>50</div>
                    <div>200</div>
                    <div>1000</div>
                    <div>🍀</div>
                    <div>20</div>
                    <div>100</div>
                    <div>400</div>
                    <div>⭐</div>
                    <div>10</div>
                    <div>40</div>
                    <div>200</div>
                    <div>🔔</div>
                    <div>6</div>
                    <div>20</div>
                    <div>100</div>
                    <div>🍋</div>
                    <div>4</div>
                    <div>12</div>
                    <div>60</div>
                    <div>🍒</div>
                    <div>2</div>
                    <div>6</div>
                    <div>30</div>
                </div>
                <div class="legend">Approximate RTP depends on RNG/weights. No real money.</div>
                <div>
                    <label>Lines preview</label>
                    <div class="lines-preview" id="linesPreview" aria-hidden="true"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
